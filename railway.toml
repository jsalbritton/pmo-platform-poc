# ============================================================
# railway.toml — PMO Platform FastAPI Deployment Config
# ============================================================
# Build and start commands are intentionally OMITTED here.
# A Dockerfile at the repo root handles both build and CMD.
#
# Railway detects the Dockerfile automatically and uses it,
# bypassing Nixpacks (which mis-detects this as a Node.js project
# because package.json exists for the Vite frontend).
#
# The Dockerfile:
#   - Uses python:3.11-slim (pip included, no module issues)
#   - COPY api/ → WORKDIR /app (no "cd api" needed at runtime)
#   - CMD uvicorn main:app --host 0.0.0.0 --port ${PORT}
#
# PRODUCTION NOTE (Azure):
# The same Dockerfile becomes the Container App image.
# Replace Railway's injected $PORT with Azure's default 8000.
#
# PORT is injected by Railway automatically at runtime.

[deploy]
# Railway health check — pings this URL to verify the service is alive.
# /health is a public endpoint (no JWT required) — intentional for infra checks.
healthcheckPath = "/health"

# How long Railway waits for /health to return 200 on first deploy.
# 30s is conservative — FastAPI + joblib model load takes ~5-10s cold start.
healthcheckTimeout = 30

# Number of restart attempts before Railway marks the service as failed.
restartPolicyMaxRetries = 3
